name: Contracts CI
on:
  push:
    branches: [main]
    paths: ['contracts/**']
  pull_request:
    paths: ['contracts/**']
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build
      - run: forge test -vvv
